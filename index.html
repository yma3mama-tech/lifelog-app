<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeLog</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #1C1C1E;
    --surface:  #2C2C2E;
    --surface2: #3A3A3C;
    --border:   #48484A;
    --text:     #E5E5EA;
    --sub:      #8E8E93;
    --green:    #30D158;
    --amber:    #FF9F0A;
    --red:      #FF453A;
    --blue:     #0A84FF;
    --mono:     'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --ui:       system-ui, -apple-system, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--ui);
    font-size: 14px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: var(--mono);
    font-size: 15px;
    letter-spacing: .05em;
    color: var(--green);
  }
  .date-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--sub);
    letter-spacing: .04em;
  }

  /* ── Tab bar (mobile) ── */
  .tab-bar {
    display: none;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: var(--sub);
    font-family: var(--ui);
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

  /* ── Main layout ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left: Task pane ── */
  .task-pane {
    width: 420px;
    min-width: 280px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .task-scroll {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 16px;
  }
  .task-scroll::-webkit-scrollbar { width: 4px; }
  .task-scroll::-webkit-scrollbar-track { background: transparent; }
  .task-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px 8px;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
  }
  .section-toggle {
    color: var(--sub);
    font-size: 10px;
    width: 12px;
    flex-shrink: 0;
    transition: transform .15s;
  }
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--sub);
  }
  .count-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text);
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 8px;
    min-width: 22px;
    text-align: center;
  }
  .section-header .spacer { flex: 1; }

  /* Task input */
  .task-input-row {
    display: flex;
    gap: 6px;
    padding: 0 16px 12px;
  }
  .task-input-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: var(--ui);
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
    min-width: 0;
  }
  .task-input-row input:focus { border-color: var(--blue); }
  .task-input-row input::placeholder { color: var(--sub); }

  /* Task list */
  .task-list {
    padding: 0 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 40px;
  }
  .section.collapsed .task-list,
  .section.collapsed .task-input-row { display: none; }

  /* Task card */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
    cursor: default;
    user-select: none;
  }
  .task-card.running { border-color: var(--green); }
  .task-card.paused  { border-color: var(--amber); }
  .task-card.done    { opacity: .5; }

  .task-main-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* pulse bar */
  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: background .2s;
  }
  .task-card.running::before {
    background: var(--green);
    animation: pulse-bar 1.5s ease-in-out infinite;
  }
  .task-card.paused::before { background: var(--amber); }
  @keyframes pulse-bar {
    0%,100% { opacity: 1; }
    50%      { opacity: .35; }
  }

  .task-drag-handle {
    color: var(--border);
    cursor: grab;
    font-size: 14px;
    flex-shrink: 0;
    touch-action: none;
  }
  .task-drag-handle:active { cursor: grabbing; }

  .task-name {
    flex: 1;
    font-size: 13px;
    line-height: 1.4;
    word-break: break-all;
  }
  .task-name.done-text { text-decoration: line-through; color: var(--sub); }

  .task-elapsed {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--sub);
    min-width: 52px;
    text-align: right;
    flex-shrink: 0;
  }
  .task-elapsed.running-time { color: var(--green); }
  .task-elapsed.paused-time  { color: var(--amber); }

  .task-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  /* meta row (due / memo / carried badges) */
  .task-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding-left: 24px;
  }
  .due-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--sub);
    background: var(--surface2);
    border-radius: 6px;
    padding: 2px 7px;
    white-space: nowrap;
  }
  .due-badge.due-soon  { color: var(--amber); }
  .due-badge.due-today { color: #000; background: var(--amber); font-weight: 600; }
  .due-badge.overdue   { color: #fff; background: var(--red);   font-weight: 600; }
  .carried-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: #000;
    background: var(--amber);
    border-radius: 6px;
    padding: 2px 7px;
    font-weight: 600;
    white-space: nowrap;
  }
  .memo-mark {
    font-size: 11px;
    color: var(--sub);
  }

  /* detail edit panel */
  .task-detail {
    border-top: 1px solid var(--border);
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: default;
  }
  .task-detail label {
    font-size: 10px;
    color: var(--sub);
    letter-spacing: .05em;
    display: block;
    margin-bottom: 2px;
  }
  .task-detail input[type="text"],
  .task-detail input[type="date"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--ui);
    font-size: 12px;
    outline: none;
    color-scheme: dark;
  }
  .task-detail input:focus { border-color: var(--blue); }
  .detail-row { display: flex; gap: 6px; align-items: flex-end; }
  .detail-row > div { flex: 1; min-width: 0; }
  .detail-btn-row {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    padding-top: 2px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 5px 10px;
    border-radius: 6px;
    border: none;
    font-family: var(--ui);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s, transform .08s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.96); }
  .btn:disabled { opacity: .35; cursor: default; transform: none; }

  .btn-green  { background: var(--green);  color: #000; }
  .btn-amber  { background: var(--amber);  color: #000; }
  .btn-red    { background: var(--red);    color: #fff; }
  .btn-ghost  { background: var(--surface2); color: var(--text); }
  .btn-blue   { background: var(--blue);   color: #fff; }
  .btn-icon   { padding: 5px 7px; }
  .btn-move   { background: var(--surface2); color: var(--blue); font-family: var(--mono); font-size: 11px; }

  /* ── Right: Log pane ── */
  .log-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    flex-shrink: 0;
    gap: 8px;
    flex-wrap: wrap;
  }
  .date-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .date-nav-btn {
    background: var(--surface2);
    border: none;
    color: var(--text);
    border-radius: 6px;
    width: 26px; height: 26px;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .date-nav-btn:disabled { opacity: .25; cursor: default; }
  .date-nav-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    min-width: 90px;
    text-align: center;
    padding: 3px 6px;
    border-radius: 6px;
    background: var(--surface2);
    cursor: pointer;
  }
  .date-nav-label.today { color: var(--green); }
  .past-banner {
    display: none;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--amber);
    flex-shrink: 0;
    align-items: center;
    gap: 8px;
  }
  .past-banner.visible { display: flex; }

  .log-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .log-entry:hover .log-delete { opacity: 1; }

  .log-icon {
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 1px;
    width: 16px;
    text-align: center;
  }
  .log-body { flex: 1; min-width: 0; }
  .log-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--sub);
    margin-bottom: 2px;
  }
  .log-text {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
    color: var(--text);
    word-break: break-all;
  }
  .log-delete {
    background: none;
    border: none;
    color: var(--sub);
    cursor: pointer;
    opacity: 0;
    font-size: 12px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: opacity .15s, color .15s;
    flex-shrink: 0;
  }
  .log-delete:hover { color: var(--red); }

  /* Export area */
  .export-area {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* empty state */
  .empty {
    color: var(--sub);
    font-size: 12px;
    text-align: center;
    padding: 24px 0;
    font-family: var(--mono);
  }

  /* mobile */
  @media (max-width: 680px) {
    .tab-bar { display: flex; }
    .task-pane {
      width: 100%;
      border-right: none;
    }
    .log-pane { display: none; }
    main { overflow: hidden; }
    .task-pane.hidden, .log-pane.hidden-pane { display: none; }
    .log-pane.show-mobile { display: flex; width: 100%; }
  }

  /* drag ghost */
  .task-card.dragging { opacity: .4; }
  .task-card.drag-over { border-color: var(--blue); }
  .task-list.drag-over-list {
    outline: 1px dashed var(--blue);
    outline-offset: -2px;
    border-radius: 10px;
  }

  /* toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 20px;
    pointer-events: none;
    transition: transform .25s ease, opacity .25s;
    opacity: 0;
    z-index: 100;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <span class="logo">LifeLog</span>
  <span class="date-label" id="dateLabel"></span>
</header>

<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" onclick="switchTab('tasks')">タスク</button>
  <button class="tab-btn"        onclick="switchTab('log')">ログ</button>
</div>

<main>
  <!-- ── Task Pane ── -->
  <div class="task-pane" id="taskPane">
    <div class="task-scroll">

      <!-- 今日やること -->
      <div class="section" id="sectionToday">
        <div class="section-header" onclick="toggleSection('today')">
          <span class="section-toggle" id="toggleToday">▼</span>
          <span class="section-title">今日やること</span>
          <span class="count-badge" id="countToday">0</span>
          <span class="spacer"></span>
          <button class="btn btn-ghost" style="font-size:11px;padding:4px 8px"
                  onclick="event.stopPropagation();clearDone()">完了済みを削除</button>
        </div>
        <div class="task-list" id="todayList" data-section="today"></div>
      </div>

      <!-- タスク一覧 -->
      <div class="section" id="sectionStock">
        <div class="section-header" onclick="toggleSection('stock')">
          <span class="section-toggle" id="toggleStock">▼</span>
          <span class="section-title">タスク一覧</span>
          <span class="count-badge" id="countStock">0</span>
          <span class="spacer"></span>
          <button class="btn btn-ghost" id="sortBtn" style="font-size:11px;padding:4px 8px"
                  onclick="event.stopPropagation();cycleSort()" title="並び替え">並び: 手動</button>
        </div>
        <div class="task-input-row">
          <input type="text" id="taskInput" placeholder="タスクを追加… (Enter)" maxlength="100"
                 onkeydown="if(event.key==='Enter')addTask()">
          <button class="btn btn-ghost btn-icon" onclick="addTask()" title="追加">＋</button>
        </div>
        <div class="task-list" id="stockList" data-section="stock"></div>
      </div>

    </div>
  </div>

  <!-- ── Log Pane ── -->
  <div class="log-pane" id="logPane">
    <div class="log-toolbar">
      <div class="date-nav">
        <button class="date-nav-btn" id="prevDayBtn" onclick="shiftDay(-1)" title="前日">‹</button>
        <span class="date-nav-label today" id="dateNavLabel" onclick="goToday()">今日</span>
        <button class="date-nav-btn" id="nextDayBtn" onclick="shiftDay(1)" title="翌日" disabled>›</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost" onclick="addNote()" style="font-size:11px;padding:4px 8px">📝 メモ追加</button>
        <button class="btn btn-blue"  onclick="copyLog()"  style="font-size:11px;padding:4px 8px">コピー</button>
        <button class="btn btn-ghost btn-icon" onclick="clearDayLog()" title="この日のログを削除" style="color:var(--red)">🗑</button>
      </div>
    </div>
    <div class="past-banner" id="pastBanner">
      📅 過去のログを表示中 — <button class="btn btn-ghost" style="font-size:11px;padding:2px 8px" onclick="goToday()">今日に戻る</button>
    </div>

    <!-- メモ入力バー -->
    <div id="noteBar" style="display:none;gap:6px;padding:0 16px 10px;flex-shrink:0">
      <input id="noteInput" type="text" placeholder="メモを入力… (Enter)" maxlength="200"
             style="flex:1;background:var(--surface);border:1px solid var(--blue);border-radius:8px;
                    padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;"
             onkeydown="if(event.key==='Enter')submitNote();if(event.key==='Escape'){this.parentElement.style.display='none';}">
      <button class="btn btn-blue" onclick="submitNote()">追加</button>
      <button class="btn btn-ghost" onclick="document.getElementById('noteBar').style.display='none'">✕</button>
    </div>

    <div class="log-list" id="logList"></div>

    <div class="export-area">
      <span style="font-size:11px;color:var(--sub);font-family:var(--mono)">Markdown形式でコピー →</span>
      <button class="btn btn-blue" onclick="copyLog()">📋 クリップボードにコピー</button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// ── State ──
let tasks    = [];
let allLogs  = {};   // { 'YYYY-MM-DD': [{id,icon,text,time}, ...] }
let activeId = null;
let intervalId = null;
let viewDate = todayKey(); // currently viewed date
let editingId = null;      // task being edited inline
let sortMode  = 'manual';  // manual | due | created
let collapsed = { today: false, stock: false };
let lastDay   = todayKey();

const TASK_KEY    = 'lifelog_tasks_v2';
const TASK_KEY_V1 = 'lifelog_tasks_v1';
const LOG_KEY     = 'lifelog_logs_v2';
const UI_KEY      = 'lifelog_ui_v1';

const SORT_LABEL = { manual: '手動', due: '期限順', created: '追加順' };

// ── Date helpers ──
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function keyToDate(k) {
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y, m-1, d);
}
function keyToLabel(k) {
  if (k === todayKey()) return '今日';
  const d = keyToDate(k);
  const diff = Math.round((new Date(todayKey()) - d) / 86400000);
  if (diff === 1) return '昨日';
  return d.toLocaleDateString('ja-JP', {month:'numeric',day:'numeric',weekday:'short'});
}
function sortedLogDates() {
  return Object.keys(allLogs).sort();
}

// ── Persist ──
function save() {
  localStorage.setItem(TASK_KEY, JSON.stringify(tasks));
  localStorage.setItem(LOG_KEY,  JSON.stringify(allLogs));
}
function saveUI() {
  localStorage.setItem(UI_KEY, JSON.stringify({ sortMode, collapsed }));
}
function loadUI() {
  try {
    const ui = JSON.parse(localStorage.getItem(UI_KEY));
    if (ui) {
      if (SORT_LABEL[ui.sortMode]) sortMode = ui.sortMode;
      if (ui.collapsed) collapsed = { today: !!ui.collapsed.today, stock: !!ui.collapsed.stock };
    }
  } catch {}
}
function load() {
  // ── v2 tasks / v1 → v2 migration ──
  const rawV2 = localStorage.getItem(TASK_KEY);
  if (rawV2) {
    try { tasks = JSON.parse(rawV2) || []; } catch { tasks = []; }
  } else {
    let v1 = [];
    try { v1 = JSON.parse(localStorage.getItem(TASK_KEY_V1)) || []; } catch { v1 = []; }
    tasks = v1.map(t => ({
      ...t,
      dueDate:   null,
      memo:      '',
      todayDate: null,
      createdAt: todayKey(),
    }));
    if (tasks.length) localStorage.setItem(TASK_KEY, JSON.stringify(tasks));
    // v1 キーは残置(読み取りのみ)
  }
  // フィールド補完(古いv2データや欠損への保険)
  tasks.forEach(t => {
    if (t.dueDate   === undefined) t.dueDate   = null;
    if (t.memo      === undefined) t.memo      = '';
    if (t.todayDate === undefined) t.todayDate = null;
    if (t.createdAt === undefined) t.createdAt = todayKey();
    if (t.carriedFrom === undefined) t.carriedFrom = null;
  });

  // ── logs (v3 と同じ) ──
  const raw = localStorage.getItem(LOG_KEY);
  const rawOld = localStorage.getItem('lifelog_logs_v1');
  if (raw) {
    try { allLogs = JSON.parse(raw); } catch { allLogs = {}; }
  } else if (rawOld) {
    try {
      const old = JSON.parse(rawOld);
      if (Array.isArray(old) && old.length) allLogs[todayKey()] = old;
    } catch {}
    allLogs = allLogs || {};
  } else {
    allLogs = {};
  }
  // restore running → paused on reload
  tasks.forEach(t => {
    if (t.status === 'running') {
      t.status = 'paused';
      addLogEntry('⏸', `「${t.name}」を中断（再起動により）`);
    }
  });
  activeId = null;

  carryOver();
  save();
}

// ── 日付繰越(持ち越し) ──
function carryOver() {
  const today = todayKey();
  let changed = false;
  // 過去日の完了済み今日タスクは自動削除(実行記録はログに残っている)
  const before = tasks.length;
  tasks = tasks.filter(t => !(t.todayDate && t.todayDate < today && t.status === 'done'));
  if (tasks.length !== before) changed = true;
  // 過去日の未完了今日タスクは今日へ持ち越し
  tasks.forEach(t => {
    if (t.todayDate && t.todayDate < today && t.status !== 'done') {
      t.carriedFrom = t.todayDate;
      t.todayDate = today;
      changed = true;
    }
  });
  return changed;
}

// ── Helpers ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmt(ms) {
  if (!ms && ms !== 0) return '--:--';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function nowStr() {
  return new Date().toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function dateStr(key) {
  const k = key || todayKey();
  return keyToDate(k).toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Log ──
function logsForDate(key) {
  return allLogs[key] || [];
}
function addLogEntry(icon, text) {
  const k = todayKey();
  if (!allLogs[k]) allLogs[k] = [];
  allLogs[k].push({ id: uid(), icon, text, time: nowStr() });
  save();
  if (viewDate === k) renderLog();
}
function deleteLog(id) {
  const entries = logsForDate(viewDate);
  allLogs[viewDate] = entries.filter(l => l.id !== id);
  if (!allLogs[viewDate].length) delete allLogs[viewDate];
  save();
  renderLog();
}
function clearDayLog() {
  const entries = logsForDate(viewDate);
  if (!entries.length) { toast('ログがありません'); return; }
  if (!confirm(`${dateStr(viewDate)} のログを削除しますか？`)) return;
  delete allLogs[viewDate];
  save();
  renderLog();
}

// ── Date navigation ──
function shiftDay(delta) {
  const dates = sortedLogDates();
  const today = todayKey();
  const navSet = new Set([...dates, today]);
  const navDates = [...navSet].sort();
  const idx = navDates.indexOf(viewDate);
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= navDates.length) return;
  viewDate = navDates[newIdx];
  renderLog();
  updateDateNav();
}
function goToday() {
  viewDate = todayKey();
  renderLog();
  updateDateNav();
}
function updateDateNav() {
  const today = todayKey();
  const dates = sortedLogDates();
  const navSet = new Set([...dates, today]);
  const navDates = [...navSet].sort();
  const idx = navDates.indexOf(viewDate);

  const label   = document.getElementById('dateNavLabel');
  const prevBtn = document.getElementById('prevDayBtn');
  const nextBtn = document.getElementById('nextDayBtn');
  const banner  = document.getElementById('pastBanner');

  label.textContent = keyToLabel(viewDate);
  label.className = 'date-nav-label' + (viewDate === today ? ' today' : '');

  prevBtn.disabled = idx <= 0;
  nextBtn.disabled = idx >= navDates.length - 1;

  banner.classList.toggle('visible', viewDate !== today);
}

// ── Note ──
function addNote() {
  const bar = document.getElementById('noteBar');
  bar.style.display = bar.style.display === 'none' ? 'flex' : 'none';
  if (bar.style.display === 'flex') document.getElementById('noteInput').focus();
}
function submitNote() {
  const inp = document.getElementById('noteInput');
  const text = inp.value.trim();
  if (!text) return;
  addLogEntry('📝', text);
  inp.value = '';
  document.getElementById('noteBar').style.display = 'none';
}

// ── Tasks ──
function addTask() {
  const inp = document.getElementById('taskInput');
  const name = inp.value.trim();
  if (!name) return;
  tasks.push({
    id: uid(), name, status: 'idle', elapsed: 0, startedAt: null,
    dueDate: null, memo: '', todayDate: null, createdAt: todayKey(), carriedFrom: null,
  });
  inp.value = '';
  save();
  renderTasks();
}
function startTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t || t.status === 'done') return;
  if (t.todayDate !== todayKey()) return; // タイマーは今日リストのみ
  if (activeId && activeId !== id) pauseTask(activeId);
  const wasIdle = t.status === 'idle';
  t.status = 'running';
  t.startedAt = Date.now();
  activeId = id;
  save();
  renderTasks();
  if (wasIdle) addLogEntry('▶', `「${t.name}」を開始`);
  else         addLogEntry('▶', `「${t.name}」を再開`);
  startInterval();
}
function pauseTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t || t.status !== 'running') return;
  t.elapsed += Date.now() - t.startedAt;
  t.startedAt = null;
  t.status = 'paused';
  if (activeId === id) activeId = null;
  save();
  renderTasks();
  addLogEntry('⏸', `「${t.name}」を中断（経過 ${fmt(t.elapsed)}）`);
  if (!activeId) clearInterval(intervalId);
}
function finishTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  if (t.status === 'running') {
    t.elapsed += Date.now() - t.startedAt;
    t.startedAt = null;
  }
  t.status = 'done';
  if (activeId === id) { activeId = null; clearInterval(intervalId); }
  save();
  renderTasks();
  addLogEntry('✅', `「${t.name}」を完了（所要 ${fmt(t.elapsed)}）`);
}
function deleteTask(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  if (t.status === 'running') pauseTask(id);
  if (editingId === id) editingId = null;
  tasks = tasks.filter(t => t.id !== id);
  save();
  renderTasks();
}
function clearDone() {
  tasks = tasks.filter(t => t.status !== 'done');
  save();
  renderTasks();
}

// ── 移動操作 ──
function moveToToday(id) {
  const t = tasks.find(t => t.id === id);
  if (!t || t.todayDate === todayKey()) return;
  t.todayDate = todayKey();
  t.carriedFrom = null;
  if (editingId === id) editingId = null;
  save();
  renderTasks();
  addLogEntry('📌', `『${t.name}』を今日やることに追加`);
}
function moveToStock(id) {
  const t = tasks.find(t => t.id === id);
  if (!t || !t.todayDate) return;
  if (t.status === 'running') pauseTask(id);
  t.todayDate = null;
  t.carriedFrom = null;
  save();
  renderTasks();
  addLogEntry('↩', `『${t.name}』をタスク一覧に戻した`);
}

// ── 詳細編集 ──
function toggleEdit(id) {
  editingId = (editingId === id) ? null : id;
  renderTasks();
  if (editingId) {
    const el = document.querySelector(`[data-task="${editingId}"] .detail-name`);
    if (el) el.focus();
  }
}
function updateTaskName(id, value) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const name = value.trim().slice(0, 100);
  if (name) t.name = name;
  save();
  renderTasks();
}
function updateTaskDue(id, value) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.dueDate = value || null;
  save();
  renderTasks();
}
function clearTaskDue(id) {
  updateTaskDue(id, null);
}
function updateTaskMemo(id, value) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.memo = (value || '').slice(0, 200);
  save();
  renderTasks();
}

// ── 並び替え ──
function cycleSort() {
  sortMode = sortMode === 'manual' ? 'due' : sortMode === 'due' ? 'created' : 'manual';
  saveUI();
  renderTasks();
}
function toggleSection(sec) {
  collapsed[sec] = !collapsed[sec];
  saveUI();
  renderTasks();
}

// ── Timer ──
function startInterval() {
  clearInterval(intervalId);
  intervalId = setInterval(() => {
    if (!activeId) return;
    const t = tasks.find(t => t.id === activeId);
    if (!t) return;
    const el = document.querySelector(`[data-task="${activeId}"] .task-elapsed`);
    if (el) el.textContent = fmt(t.elapsed + (Date.now() - t.startedAt));
  }, 1000);
}

// ── 期限バッジ ──
function dueBadgeHtml(t) {
  if (!t.dueDate) return '';
  const today = todayKey();
  const diff = Math.round((keyToDate(t.dueDate) - keyToDate(today)) / 86400000);
  const label = keyToDate(t.dueDate).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric',weekday:'short'});
  if (diff < 0)   return `<span class="due-badge overdue">📅 ${label} 期限切れ</span>`;
  if (diff === 0) return `<span class="due-badge due-today">📅 今日まで</span>`;
  if (diff <= 3)  return `<span class="due-badge due-soon">📅 ${label} まで</span>`;
  return `<span class="due-badge">📅 ${label} まで</span>`;
}

// ── Render Tasks ──
function todayTasks() {
  const today = todayKey();
  return tasks.filter(t => t.todayDate === today);
}
function stockTasks() {
  let arr = tasks.filter(t => !t.todayDate);
  if (sortMode === 'due') {
    arr = [...arr].sort((a, b) => (a.dueDate || '9999-99-99') < (b.dueDate || '9999-99-99') ? -1 : 1);
  } else if (sortMode === 'created') {
    arr = [...arr].sort((a, b) => (a.createdAt || '') < (b.createdAt || '') ? -1 : 1);
  }
  return arr;
}

function renderTasks() {
  const today = todayTasks();
  const stock = stockTasks();

  document.getElementById('countToday').textContent = today.length;
  document.getElementById('countStock').textContent = stock.length;
  document.getElementById('toggleToday').textContent = collapsed.today ? '▶' : '▼';
  document.getElementById('toggleStock').textContent = collapsed.stock ? '▶' : '▼';
  document.getElementById('sectionToday').classList.toggle('collapsed', collapsed.today);
  document.getElementById('sectionStock').classList.toggle('collapsed', collapsed.stock);
  document.getElementById('sortBtn').textContent = '並び: ' + SORT_LABEL[sortMode];

  // 今日やること
  const todayList = document.getElementById('todayList');
  todayList.innerHTML = '';
  if (!today.length) {
    todayList.innerHTML = '<div class="empty">タスク一覧から ↑ で追加してください</div>';
  } else {
    today.forEach(t => todayList.appendChild(buildTodayCard(t)));
  }

  // タスク一覧
  const stockList = document.getElementById('stockList');
  stockList.innerHTML = '';
  if (!stock.length) {
    stockList.innerHTML = '<div class="empty">タスクがありません</div>';
  } else {
    stock.forEach(t => stockList.appendChild(buildStockCard(t)));
  }
}

function buildTodayCard(t) {
  const div = document.createElement('div');
  div.className = `task-card ${t.status}`;
  div.dataset.task = t.id;
  div.draggable = true;
  const elapsed = t.status === 'running' ? t.elapsed + (Date.now() - t.startedAt) : t.elapsed;
  const elapsedClass = t.status === 'running' ? 'running-time' : t.status === 'paused' ? 'paused-time' : '';

  let actions = '';
  if (t.status === 'idle') {
    actions = `<button class="btn btn-green btn-icon" onclick="startTask('${t.id}')" title="開始">▶</button>
               <button class="btn btn-move btn-icon" onclick="moveToStock('${t.id}')" title="タスク一覧に戻す">↓</button>`;
  } else if (t.status === 'running') {
    actions = `<button class="btn btn-amber btn-icon" onclick="pauseTask('${t.id}')" title="中断">⏸</button>
               <button class="btn btn-ghost btn-icon" onclick="finishTask('${t.id}')" title="完了">✅</button>`;
  } else if (t.status === 'paused') {
    actions = `<button class="btn btn-green btn-icon" onclick="startTask('${t.id}')" title="再開">▶</button>
               <button class="btn btn-ghost btn-icon" onclick="finishTask('${t.id}')" title="完了">✅</button>
               <button class="btn btn-move btn-icon" onclick="moveToStock('${t.id}')" title="タスク一覧に戻す">↓</button>`;
  } else {
    actions = `<button class="btn btn-ghost btn-icon" onclick="deleteTask('${t.id}')" title="削除">✕</button>`;
  }

  // メタ行(持ち越し / 期限 / メモ)
  const metaParts = [];
  if (t.carriedFrom && t.status !== 'done') metaParts.push('<span class="carried-badge">持ち越し</span>');
  const due = dueBadgeHtml(t);
  if (due) metaParts.push(due);
  if (t.memo) metaParts.push(`<span class="memo-mark" title="${escHtml(t.memo)}">📝 ${escHtml(t.memo)}</span>`);
  const metaRow = metaParts.length ? `<div class="task-meta-row">${metaParts.join('')}</div>` : '';

  div.innerHTML = `
    <div class="task-main-row">
      <span class="task-drag-handle" title="ドラッグで並び替え">⠿</span>
      <span class="task-name ${t.status==='done'?'done-text':''}">${escHtml(t.name)}</span>
      <span class="task-elapsed ${elapsedClass}">${elapsed>0?fmt(elapsed):''}</span>
      <div class="task-actions">${actions}</div>
    </div>
    ${metaRow}
  `;
  attachDnD(div, t, 'today');
  return div;
}

function buildStockCard(t) {
  const div = document.createElement('div');
  div.className = 'task-card';
  div.dataset.task = t.id;
  div.draggable = true;

  const metaParts = [];
  const due = dueBadgeHtml(t);
  if (due) metaParts.push(due);
  if (t.memo) metaParts.push(`<span class="memo-mark" title="${escHtml(t.memo)}">📝 メモあり</span>`);
  const metaRow = metaParts.length ? `<div class="task-meta-row">${metaParts.join('')}</div>` : '';

  const editing = editingId === t.id;
  const detail = editing ? `
    <div class="task-detail" onclick="event.stopPropagation()">
      <div>
        <label>タスク名</label>
        <input type="text" class="detail-name" value="${escHtml(t.name)}" maxlength="100"
               onchange="updateTaskName('${t.id}', this.value)"
               onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      <div class="detail-row">
        <div>
          <label>期限</label>
          <input type="date" value="${t.dueDate || ''}" onchange="updateTaskDue('${t.id}', this.value)">
        </div>
        <button class="btn btn-ghost" onclick="clearTaskDue('${t.id}')" title="期限をクリア">クリア</button>
      </div>
      <div>
        <label>メモ</label>
        <input type="text" value="${escHtml(t.memo || '')}" maxlength="200" placeholder="補足メモ…"
               onchange="updateTaskMemo('${t.id}', this.value)"
               onkeydown="if(event.key==='Enter')this.blur()">
      </div>
      <div class="detail-btn-row">
        <button class="btn btn-red" style="font-size:11px" onclick="deleteTask('${t.id}')">削除</button>
        <button class="btn btn-ghost" style="font-size:11px" onclick="toggleEdit('${t.id}')">閉じる</button>
      </div>
    </div>` : '';

  div.innerHTML = `
    <div class="task-main-row">
      <span class="task-drag-handle" title="ドラッグで並び替え">⠿</span>
      <span class="task-name">${escHtml(t.name)}</span>
      <span class="task-elapsed">${t.elapsed>0?fmt(t.elapsed):''}</span>
      <div class="task-actions">
        <button class="btn btn-move" onclick="moveToToday('${t.id}')" title="今日やることに追加">↑ 今日</button>
      </div>
    </div>
    ${metaRow}
    ${detail}
  `;
  div.addEventListener('click', e => {
    if (e.target.closest('button, input, .task-drag-handle, .task-detail')) return;
    toggleEdit(t.id);
  });
  attachDnD(div, t, 'stock');
  return div;
}

// ── Drag & Drop ──
function attachDnD(div, t, section) {
  div.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', t.id);
    div.classList.add('dragging');
  });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));
  div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
  div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
  div.addEventListener('drop', e => {
    e.preventDefault();
    e.stopPropagation();
    div.classList.remove('drag-over');
    const fromId = e.dataTransfer.getData('text/plain');
    if (fromId === t.id) return;
    const from = tasks.find(x => x.id === fromId);
    if (!from) return;
    const fromSection = from.todayDate === todayKey() ? 'today' : 'stock';

    if (fromSection !== section) {
      // セクション間移動(ドロップ先の位置に挿入)
      if (section === 'today') moveToToday(fromId);
      else moveToStock(fromId);
    } else if (section === 'stock' && sortMode !== 'manual') {
      toast('並び替えは「手動」モードで行えます');
      return;
    }
    // 配列上でドロップ先の位置へ並び替え
    const fi = tasks.findIndex(x => x.id === fromId);
    const ti = tasks.findIndex(x => x.id === t.id);
    if (fi < 0 || ti < 0) return;
    const [item] = tasks.splice(fi, 1);
    tasks.splice(ti, 0, item);
    save();
    renderTasks();
  });
}
// セクションの空き領域へのドロップ(末尾に移動)
function attachListDnD(listId, section) {
  const list = document.getElementById(listId);
  list.addEventListener('dragover', e => { e.preventDefault(); list.classList.add('drag-over-list'); });
  list.addEventListener('dragleave', () => list.classList.remove('drag-over-list'));
  list.addEventListener('drop', e => {
    e.preventDefault();
    list.classList.remove('drag-over-list');
    const fromId = e.dataTransfer.getData('text/plain');
    const from = tasks.find(x => x.id === fromId);
    if (!from) return;
    const fromSection = from.todayDate === todayKey() ? 'today' : 'stock';
    if (fromSection === section) return; // カード上のドロップで処理済み
    if (section === 'today') moveToToday(fromId);
    else moveToStock(fromId);
  });
}

// ── Render Log ──
function renderLog() {
  const list = document.getElementById('logList');
  const entries = logsForDate(viewDate);
  if (!entries.length) {
    list.innerHTML = '<div class="empty">この日のログはありません</div>';
    return;
  }
  list.innerHTML = '';
  [...entries].reverse().forEach(l => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `
      <span class="log-icon">${l.icon}</span>
      <div class="log-body">
        <div class="log-time">${l.time}</div>
        <div class="log-text">${escHtml(l.text)}</div>
      </div>
      <button class="log-delete" onclick="deleteLog('${l.id}')" title="削除">✕</button>
    `;
    list.appendChild(div);
  });
  updateDateNav();
}

// ── Copy as Markdown ──
function copyLog() {
  const entries = logsForDate(viewDate);
  if (!entries.length) { toast('ログがありません'); return; }
  const lines = [
    `# 日誌 ${dateStr(viewDate)}`,
    '',
    ...entries.map(l => `- ${l.time}　${l.icon} ${l.text}`)
  ];
  const text = lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => toast('クリップボードにコピーしました'))
      .catch(() => showCopyModal(text));
  } else {
    showCopyModal(text);
  }
}
function showCopyModal(text) {
  const existing = document.getElementById('copyModal');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'copyModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;';
  const box = document.createElement('div');
  box.style.cssText = 'background:#2C2C2E;border:1px solid #48484A;border-radius:12px;padding:20px;width:100%;max-width:560px;display:flex;flex-direction:column;gap:12px;';
  const title = document.createElement('div');
  title.style.cssText = 'font-size:13px;color:#8E8E93;font-family:system-ui';
  title.textContent = '以下を選択してコピーしてください (Ctrl+A → Ctrl+C)';
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'background:#1C1C1E;border:1px solid #48484A;border-radius:8px;color:#E5E5EA;font-family:monospace;font-size:12px;line-height:1.6;padding:12px;resize:none;height:240px;outline:none;width:100%;';
  ta.readOnly = true;
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;justify-content:flex-end';
  const tryBtn = document.createElement('button');
  tryBtn.className = 'btn btn-blue';
  tryBtn.textContent = '全選択してコピー';
  tryBtn.onclick = () => { ta.select(); try { document.execCommand('copy'); toast('コピーしました'); overlay.remove(); } catch { toast('Ctrl+C でコピーしてください'); } };
  const closeBtn = document.createElement('button');
  closeBtn.className = 'btn btn-ghost';
  closeBtn.textContent = '閉じる';
  closeBtn.onclick = () => overlay.remove();
  btnRow.appendChild(tryBtn); btnRow.appendChild(closeBtn);
  box.appendChild(title); box.appendChild(ta); box.appendChild(btnRow);
  overlay.appendChild(box); document.body.appendChild(overlay);
  setTimeout(() => { ta.focus(); ta.select(); }, 50);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// ── Escape HTML ──
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Date header + 日付変更検知 ──
function updateDateLabel() {
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
  // 日付が変わったら繰越を実行
  const today = todayKey();
  if (today !== lastDay) {
    const wasViewingToday = viewDate === lastDay;
    lastDay = today;
    if (carryOver()) save();
    if (wasViewingToday) viewDate = today;
    renderTasks();
    renderLog();
    updateDateNav();
  }
}

// ── Mobile tabs ──
function switchTab(tab) {
  const taskPane = document.getElementById('taskPane');
  const logPane  = document.getElementById('logPane');
  const btns = document.querySelectorAll('.tab-btn');
  if (tab === 'tasks') {
    taskPane.classList.remove('hidden');
    logPane.classList.remove('show-mobile'); logPane.classList.add('hidden-pane');
    btns[0].classList.add('active'); btns[1].classList.remove('active');
  } else {
    taskPane.classList.add('hidden');
    logPane.classList.remove('hidden-pane'); logPane.classList.add('show-mobile');
    btns[1].classList.add('active'); btns[0].classList.remove('active');
  }
}

// ── Init ──
loadUI();
load();
updateDateLabel();
setInterval(updateDateLabel, 60000);
renderTasks();
renderLog();
updateDateNav();
attachListDnD('todayList', 'today');
attachListDnD('stockList', 'stock');
</script>
</body>
